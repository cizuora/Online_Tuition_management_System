<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1f2d4d 0%, #2a3f62 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #1f2d4d;
            margin-bottom: 20px;
        }

        h2 {
            color: #1f2d4d;
            margin-bottom: 15px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .logout-btn {
            background: #dc3545;
            color: white;
            padding: 8px 16px;
            text-decoration: none;
            border-radius: 6px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        button {
            background: #4e73df;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fc;
            border-radius: 6px;
            display: none;
        }

        .result h3 {
            margin-bottom: 10px;
        }

        hr {
            margin: 20px 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>Admin Dashboard</h1>
                <a href="/logout" class="logout-btn">Logout</a>
            </div>
            <p>Welcome, <strong>{{ admin_name }}</strong>!</p>

            <hr>

            <h2>Student Lookup</h2>
            <div class="form-group">
                <label>Student ID</label>
                <input type="text" id="student_id" placeholder="e.g., sh089234">
            </div>
            <button onclick="lookupStudent()">Lookup Student</button>

            <div id="result" class="result"></div>

            <hr>

            <h2>Create Payment Plan</h2>
            <div class="form-group">
                <label>Student ID</label>
                <input type="text" id="plan_student_id" placeholder="e.g., sh089234">
            </div>

            <div class="form-group">
                <label>Number of Payments</label>
                <input type="number" id="num_payments" placeholder="e.g., 4" min="1" max="24">
            </div>

            <div class="form-group">
                <label>Custom Payment Amount (optional)</label>
                <input type="number" id="custom_amount" placeholder="e.g., 250.00" step="0.01">
            </div>

            <button onclick="createPaymentPlan()">Create Payment Plan</button>

            <div id="plan-result" class="result"></div>
        </div>
    </div>

    <script>
        async function lookupStudent() {
            const studentId = document.getElementById('student_id').value;
            if (!studentId) {
                alert('Please enter a student ID');
                return;
            }

            const response = await fetch(`/api/admin/lookup?student_id=${studentId}`);
            const data = await response.json();

            const resultDiv = document.getElementById('result');
            if (data.success) {
                resultDiv.innerHTML = `
                    <h3>Student Found</h3>
                    <p><strong>Name:</strong> ${data.student.name}</p>
                    <p><strong>Student ID:</strong> ${data.student.student_id}</p>
                    <p><strong>Email:</strong> ${data.student.email}</p>
                    <p><strong>Balance:</strong> ${data.student.balance_formatted}</p>
                    <p><strong>Payment History:</strong> ${data.payment_history.count} payments</p>
                    <p><strong>Total Paid:</strong> ${data.payment_history.total_paid_formatted}</p>
                `;
                resultDiv.style.display = 'block';
            } else {
                resultDiv.innerHTML = `<p style="color:red;">Error: ${data.message}</p>`;
                resultDiv.style.display = 'block';
            }
        }

        async function createPaymentPlan() {
            const studentId = document.getElementById('plan_student_id').value;
            const numPayments = document.getElementById('num_payments').value;
            const customAmount = document.getElementById('custom_amount').value;

            if (!studentId || !numPayments) {
                alert('Please enter student ID and number of payments');
                return;
            }

            const payload = {
                student_id: studentId,
                num_payments: parseInt(numPayments)
            };

            if (customAmount) {
                payload.custom_amount = parseFloat(customAmount);
            }

            const response = await fetch('/api/admin/create-plan', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            const resultDiv = document.getElementById('plan-result');
            if (data.success) {
                resultDiv.innerHTML = `
                    <h3>Payment Plan Created</h3>
                    <p><strong>Student:</strong> ${data.plan_details.student_name}</p>
                    <p><strong>Student ID:</strong> ${data.plan_details.student_id}</p>
                    <p><strong>Number of Payments:</strong> ${data.plan_details.num_payments}</p>
                    <p><strong>Payment Amount:</strong> ${data.plan_details.payment_amount_formatted}</p>
                    <p><strong>Total Balance:</strong> ${data.plan_details.total_balance_formatted}</p>
                `;
                resultDiv.style.display = 'block';
            } else {
                resultDiv.innerHTML = `<p style="color:red;">Error: ${data.message}</p>`;
                resultDiv.style.display = 'block';
            }
        }
    </script>
</body>

</html>
